<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        .square {
            width: 100px;
            height: 100px;
            border: 4px solid red;
            margin: 20px;
        }

        .rectangle {
            width: 100px;
            height: 150px;
            border: 4px solid blue;
            margin: 20px;
        }

        .upward-triangle {
            width: 0;
            height: 0;
            border-left: 50px;
            border-right: 50px;
            border-bottom: 90px;
            border-style: solid;
            border-color: transparent transparent #8bcf74 transparent;
            margin: 20px;
        }

        .downward-triangle {
            width: 0;
            height: 0;
            border-left: 50px;
            border-right: 50px;
            border-top: 90px;
            border-style: solid;
            border-color: orange transparent transparent transparent;
            margin: 20px;
        }

        .left-triangle {
            width: 0;
            height: 0;
            border-top: 50px;
            border-bottom: 50px;
            border-right: 90px;
            border-style: solid;
            border-color: transparent blueviolet transparent transparent;
            margin: 20px;
        }

        .right-triangle {
            width: 0;
            height: 0;
            border-top: 50px;
            border-bottom: 50px;
            border-left: 90px;
            border-style: solid;
            border-color: transparent transparent transparent #d5730e;
            margin: 20px;
        }

        .trapezium {
            width: 75px;
            border: 55px solid;
            border-color: transparent transparent green transparent;
            margin: 20px;
        }

        .wide-triangle {
            width: 0;
            height: 0;
            border-left: 70px;
            border-right: 70px;
            border-bottom: 55px;
            border-style: solid;
            border-color: transparent transparent #373333 transparent;
            margin: 20px;
        }

        .acute-triangle {
            width: 0;
            height: 0;
            border-left: 20px;
            border-right: 20px;
            border-bottom: 90px;
            border-style: solid;
            border-color: transparent transparent #a52323 transparent;
            margin: 20px;
        }

        .isosceles-triangle {
            width: 0;
            height: 0;
            border: 55px solid;
            border-color: transparent transparent blue transparent;
            margin: 20px;
        }

        .right-arrow {
            width: 0;
            height: 0;
            border-top: 20px;
            border-bottom: 20px;
            border-left: 50px;
            border-style: solid;
            border-color: transparent transparent transparent #4f7343;
            margin: 20px;
        }

        .left-arrow {
            width: 0;
            height: 0;
            border-top: 20px;
            border-bottom: 20px;
            border-right: 50px;
            border-style: solid;
            border-color: transparent blueviolet transparent transparent;
            margin: 20px;
        }

        .flag {
            width: 60px;
            border: 30px solid;
            border-color: red transparent red red;
            margin: 20px;
        }
        .F8-1{
            display: inline-block;
            height: 101px;
            border-left: 11px solid red;
            margin: 20px;
        }
        .F8-2{
            display: inline-block;
            height: 30px;
            width: 50px;
            border-top: 11px solid red;
            border-bottom: 10px solid red;
            margin: 0 20px 71px -26px;
        }
        .F8-3{
            display: inline-block;
            height: 35px;
            width: 50px;
            border: 10px solid red;
            margin: 0 0 66px 0;
        }
        .F8-4{
            display: inline-block;
            height: 35px;
            width: 50px;
            border: 10px solid red;
            margin: 0 0 20px -73px;
        }

    </style>
</head>
<body>
<div class="square"></div>
<div class="rectangle"></div>
<div class="upward-triangle"></div>
<div class="downward-triangle"></div>
<div class="left-triangle"></div>
<div class="right-triangle"></div>
<div class="trapezium"></div>
<div class="wide-triangle"></div>
<div class="acute-triangle"></div>
<div class="isosceles-triangle"></div>
<div class="right-arrow"></div>
<div class="left-arrow"></div>
<div class="flag"></div>
<div class="F8-1"></div>
<div class="F8-2"></div>
<div class="F8-3"></div>
<div class="F8-4"></div>

</body>
</html>
