<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>TEACHERS PAGE</title>
  <link href="../css/base.css" rel="stylesheet">
  <link href="../css/theme.css" rel="stylesheet">
  <style>
    h3.section{
    color: Red;
    }
  </style>
</head>
<body>
<h1>TEACHERS PAGE</h1>
<!--   phần tử này có tag(h2) + class(.title) + id(special)
        id selector thắng vì có điểm cao hơn (độ ưu tiên cao hơn )
       Màu hiển thị là màu tím thạch anh -->
<h2 id="special" class="title">Danh sach giang vien</h2>
<!--   phần tử này có tag(h3) + class(.section) + external style + Internal CSS
        Internal CSS thắng vì nó đứng sau external nên độ ưu tiên cao hơn
       Màu hiển thị là màu đỏ -->
<h3 class="section">Giang vien HTML</h3>
<h3 class="section">Giang vien CSS</h3>
<h3 class="section">Giang vien Javascript</h3>
<h3 class="section">Giang vien React</h3>

</body>
</html>
